services:
  redis:
    image: redis/redis-stack:latest
    container_name: valkyrie-redis
    ports:
      - "127.0.0.1:6379:6379" 
      - "127.0.0.1:8001:8001" # RedisInsight web GUI
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:

      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
